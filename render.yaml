services:
  - type: web
    name: boothflow
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/election-management-system-1.0.0.jar --spring.profiles.active=prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: boothflow-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: boothflow-db
          property: user
      - key: DATABASE_PASS
        fromDatabase:
          name: boothflow-db
          property: password
      - key: JAVA_VERSION
        value: "17"
      - key: PORT
        value: "8081"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: boothflow-db
    databaseName: electiondb
    plan: free
