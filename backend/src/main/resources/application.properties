spring.application.name=election-management-system

# H2 in-memory database (works everywhere, no external DB needed)
spring.datasource.url=jdbc:h2:mem:electiondb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port: Render injects PORT, fall back to 8081 for local dev
server.port=${SERVER_PORT:${PORT:8081}}