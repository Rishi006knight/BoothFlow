# Production profile: PostgreSQL (for Render deployment)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/electiondb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.sql.init.data-locations=classpath:data-prod.sql
spring.h2.console.enabled=false
server.port=${PORT:8081}
