# Production profile: PostgreSQL (for Render deployment)
# DATABASE_URL is parsed and converted in entrypoint.sh into SPRING_DATASOURCE_URL/USERNAME/PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/electiondb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.data-locations=classpath:data-prod.sql
spring.sql.init.mode=always
spring.h2.console.enabled=false
server.port=${PORT:8081}
