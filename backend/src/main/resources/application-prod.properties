# Production profile: PostgreSQL (for Render deployment)
# DATABASE_URL is converted from Render format (postgres://) to JDBC format (jdbc:postgresql://) in entrypoint.sh
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/electiondb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.data-locations=classpath:data-prod.sql
spring.sql.init.mode=always
spring.h2.console.enabled=false
server.port=${PORT:8081}
